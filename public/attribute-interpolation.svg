<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560"><defs><linearGradient id="triFill" x1="0%" x2="100%" y1="100%" y2="0%"><stop offset="0%" stop-color="rgba(239, 68, 68, 0.22)"/><stop offset="50%" stop-color="rgba(99, 102, 241, 0.14)"/><stop offset="100%" stop-color="rgba(34, 197, 94, 0.20)"/></linearGradient><linearGradient id="mixFill" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="rgba(239, 68, 68, 0.95)"/><stop offset="45%" stop-color="rgba(34, 197, 94, 0.95)"/><stop offset="100%" stop-color="rgba(59, 130, 246, 0.95)"/></linearGradient><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="6" flood-color="rgba(2, 6, 23, 0.18)" stdDeviation="8"/></filter><style>.label{font:700 14px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)}.small{font:500 12px/1.35 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(71,85,105,.92)}.box{stroke:rgba(148,163,184,.75);stroke-width:1.5;fill:rgba(148,163,184,.1)}.pt{stroke:#fff;stroke-width:2}.ptA{fill:rgba(239,68,68,.95)}.ptB{fill:rgba(34,197,94,.95)}.ptC{fill:rgba(59,130,246,.95)}</style></defs><text x="380" y="64" style="font:700 28px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)" text-anchor="middle">顶点颜色插值（Interpolation）</text><text x="380" y="94" style="font:400 14px/1.4 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(100,116,139,.92)" text-anchor="middle">三角形内部任意片元 P 的颜色由三个顶点颜色按权重混合得到</text><g filter="url(#shadow)"><rect width="430" height="380" x="56" y="126" class="box" rx="18"/></g><g filter="url(#shadow)"><rect width="238" height="380" x="506" y="126" class="box" rx="18"/></g><text x="80" y="160" class="label">三角形与片元</text><text x="530" y="160" class="label">结果颜色</text><path d="M92 206h358M92 244h358M92 282h358M92 320h358M92 358h358M92 396h358M92 434h358M92 190v266m48-266v266m48-266v266m48-266v266m48-266v266m48-266v266m48-266v266m48-266v266m22-266v266" style="stroke:rgba(148,163,184,.35);stroke-width:1"/><path d="m130 430 300-20-90-200z" style="stroke:rgba(99,102,241,.78);stroke-width:2.4;fill:url(#triFill)"/><circle cx="130" cy="430" r="8" class="pt ptA"/><circle cx="430" cy="410" r="8" class="pt ptB"/><circle cx="340" cy="210" r="8" class="pt ptC"/><text x="130" y="458" class="small" text-anchor="middle">V0: 红色</text><text x="430" y="458" class="small" text-anchor="middle">V1: 绿色</text><text x="340" y="196" class="small" text-anchor="middle">V2: 蓝色</text><circle cx="290" cy="330" r="7.5" style="fill:rgba(99,102,241,.95);stroke:#fff;stroke-width:2"/><text x="300" y="322" class="label">P</text><text x="300" y="344" class="small">片元位置</text><path d="M290 330 130 430m160-100 140 80m-140-80 50-120" style="stroke:rgba(99,102,241,.55);stroke-width:1.8;stroke-dasharray:6 6"/><path d="M520 206h210" style="stroke:rgba(99,102,241,.75);stroke-width:1.8;stroke-linecap:round"/><text x="530" y="230" class="small">P 的颜色 ≈ w0·C0 + w1·C1 + w2·C2</text><text x="530" y="250" class="small">w0 + w1 + w2 = 1</text><g filter="url(#shadow)"><rect width="200" height="74" x="530" y="280" fill="rgba(15, 23, 42, 0.04)" stroke="rgba(148, 163, 184, 0.75)" stroke-width="1.5" rx="14"/></g><rect width="168" height="42" x="546" y="296" fill="rgba(99, 102, 241, 0.55)" rx="10"/><text x="625" y="366" class="small" text-anchor="middle">混合后的颜色</text><circle cx="546" cy="408" r="6.5" class="pt ptA"/><text x="560" y="412" class="small">C0</text><circle cx="596" cy="408" r="6.5" class="pt ptB"/><text x="610" y="412" class="small">C1</text><circle cx="646" cy="408" r="6.5" class="pt ptC"/><text x="660" y="412" class="small">C2</text><text x="530" y="462" class="small">同样的插值也适用于法线等属性</text></svg>