<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 580"><defs><linearGradient id="eyeFill" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="rgba(99, 102, 241, 0.22)"/><stop offset="100%" stop-color="rgba(99, 102, 241, 0.12)"/></linearGradient><linearGradient id="expFill" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="rgba(245, 158, 11, 0.26)"/><stop offset="100%" stop-color="rgba(245, 158, 11, 0.14)"/></linearGradient><linearGradient id="matFillA" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="rgba(59, 130, 246, 0.22)"/><stop offset="100%" stop-color="rgba(59, 130, 246, 0.12)"/></linearGradient><linearGradient id="matFillB" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="rgba(14, 165, 233, 0.22)"/><stop offset="100%" stop-color="rgba(14, 165, 233, 0.12)"/></linearGradient><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="6" flood-color="rgba(2, 6, 23, 0.18)" stdDeviation="8"/></filter><style>.label{font:700 14px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)}.small{font:500 12px/1.35 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(71,85,105,.92)}.tiny{font:500 11px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(71,85,105,.86)}.box{stroke:rgba(148,163,184,.75);stroke-width:1.5;fill:rgba(148,163,184,.1)}.code{font:600 13px/1.55 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,&quot;Liberation Mono&quot;,&quot;Courier New&quot;,monospace;fill:rgba(30,41,59,.92)}.offset{font:700 11px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,&quot;Liberation Mono&quot;,&quot;Courier New&quot;,monospace;fill:rgba(100,116,139,.92)}</style></defs><text x="380" y="60" style="font:700 28px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)" text-anchor="middle">WGSL 结构体布局：CameraUniform</text><text x="380" y="90" style="font:400 14px/1.4 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(100,116,139,.92)" text-anchor="middle">`eye: vec3f` 的 12 字节内容后面，`exposure: f32` 正好补上剩余 4 字节，然后矩阵从 offset 16 开始</text><g filter="url(#shadow)"><rect width="256" height="384" x="56" y="126" class="box" rx="18"/></g><text x="80" y="160" class="label">WGSL 定义</text><text x="80" y="196" class="code">struct CameraUniform {</text><text x="96" y="226" class="code">eye: vec3f,</text><text x="96" y="256" class="code">exposure: f32,</text><text x="96" y="286" class="code">viewProj: mat4x4f,</text><text x="80" y="316" class="code">};</text><text x="80" y="366" class="small">关键属性</text><text x="80" y="394" class="tiny">eye: size 12 / align 16</text><text x="80" y="418" class="tiny">exposure: size 4 / align 4</text><text x="80" y="442" class="tiny">viewProj: size 64 / align 16</text><text x="80" y="484" class="small">最终结果</text><text x="80" y="512" class="tiny">总大小 = 80 bytes</text><g filter="url(#shadow)"><rect width="368" height="384" x="336" y="126" class="box" rx="18"/></g><text x="360" y="160" class="label">内存槽位（每行 16 字节）</text><text x="356" y="196" class="offset">0</text><rect width="144" height="42" x="392" y="176" fill="url(#eyeFill)" stroke="rgba(99,102,241,.78)" stroke-width="1.8" rx="12"/><text x="464" y="201" class="label" text-anchor="middle">eye</text><text x="464" y="216" class="tiny" text-anchor="middle">12 bytes</text><rect width="48" height="42" x="536" y="176" fill="url(#expFill)" stroke="rgba(245,158,11,.82)" stroke-width="1.8" rx="12"/><text x="560" y="201" class="label" text-anchor="middle">exposure</text><text x="560" y="216" class="tiny" text-anchor="middle">4 bytes</text><text x="356" y="252" class="offset">16</text><rect width="192" height="42" x="392" y="232" fill="url(#matFillA)" stroke="rgba(59,130,246,.78)" stroke-width="1.8" rx="12"/><text x="488" y="257" class="label" text-anchor="middle">viewProj column 0</text><text x="488" y="272" class="tiny" text-anchor="middle">16 bytes</text><text x="356" y="308" class="offset">32</text><rect width="192" height="42" x="392" y="288" fill="url(#matFillB)" stroke="rgba(14,165,233,.78)" stroke-width="1.8" rx="12"/><text x="488" y="313" class="label" text-anchor="middle">viewProj column 1</text><text x="488" y="328" class="tiny" text-anchor="middle">16 bytes</text><text x="356" y="364" class="offset">48</text><rect width="192" height="42" x="392" y="344" fill="url(#matFillA)" stroke="rgba(59,130,246,.78)" stroke-width="1.8" rx="12"/><text x="488" y="369" class="label" text-anchor="middle">viewProj column 2</text><text x="488" y="384" class="tiny" text-anchor="middle">16 bytes</text><text x="356" y="420" class="offset">64</text><rect width="192" height="42" x="392" y="400" fill="url(#matFillB)" stroke="rgba(14,165,233,.78)" stroke-width="1.8" rx="12"/><text x="488" y="425" class="label" text-anchor="middle">viewProj column 3</text><text x="488" y="440" class="tiny" text-anchor="middle">16 bytes</text><text x="356" y="476" class="offset">80</text><text x="392" y="476" class="small">结构体在这里结束，80 已经是 16 的倍数</text><path stroke="rgba(245,158,11,.78)" stroke-dasharray="6 6" stroke-width="2" d="M584 198h64"/><text x="654" y="194" class="tiny">正好补满第一个 16 字节槽位</text><text x="654" y="210" class="tiny">不额外浪费空间</text></svg>