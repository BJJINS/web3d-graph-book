<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(2, 6, 23, 0.18)"/>
    </filter>
    <style>
      .title{font:700 28px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;fill:rgba(15,23,42,.92)}
      .subtitle{font:400 14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;fill:rgba(100,116,139,.92)}
      .label{font:700 16px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;fill:rgba(15,23,42,.92)}
      .desc{font:400 13px/1.35 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;fill:rgba(71,85,105,.92)}
      .tiny{font:400 12px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;fill:rgba(100,116,139,.92)}
      .box{stroke:rgba(148,163,184,.75);stroke-width:1.5}
      .boxIO{fill:rgba(148,163,184,.10)}
      .boxPos{fill:rgba(99,102,241,.12)}
      .boxColor{fill:rgba(148,163,184,.14)}
      .chip{stroke:rgba(148,163,184,.75);stroke-width:1.3;rx:10}
      .divider{stroke:rgba(148,163,184,.55);stroke-width:1.2}
      .vcenter{dominant-baseline:middle}
    </style>
  </defs>

  <text x="380" y="62" text-anchor="middle" class="title">ArrayBuffer 顶点数据分布图</text>
  <text x="380" y="92" text-anchor="middle" class="subtitle">vertexData = new ArrayBuffer((2 * 4 + 4) * 3)，每顶点 12 bytes（2×f32 + 4×u8）</text>

  <!-- Outer container -->
  <g filter="url(#shadow)">
    <rect x="70" y="120" width="620" height="300" rx="18" class="box boxIO"/>
  </g>

  <!-- Header row: offsets -->
  <text x="110" y="156" class="tiny">byte offset</text>
  <text x="210" y="156" class="tiny">0</text>
  <text x="350" y="156" class="tiny">4</text>
  <text x="500" y="156" class="tiny">8</text>
  <text x="570" y="156" class="tiny">12</text>

  <line x1="110" y1="166" x2="690" y2="166" class="divider"/>

  <!-- Rows -->
  <!-- Geometry constants -->
  <!-- left label column width=120; bar starts at x=200; bar width=460 -->

  <!-- Vertex 0 -->
  <text x="110" y="212" class="label">Vertex 0</text>
  <text x="110" y="234" class="tiny">offset 0</text>

  <rect x="200" y="196" width="153.333" height="44" class="chip boxPos"/>
  <rect x="353.333" y="196" width="153.333" height="44" class="chip boxPos"/>
  <rect x="506.666" y="196" width="76.667" height="44" class="chip boxColor"/>

  <text x="276.666" y="214" text-anchor="middle" class="desc vcenter">pos.x</text>
  <text x="276.666" y="230" text-anchor="middle" class="tiny vcenter">f32 (4B)</text>

  <text x="430.0" y="214" text-anchor="middle" class="desc vcenter">pos.y</text>
  <text x="430.0" y="230" text-anchor="middle" class="tiny vcenter">f32 (4B)</text>

  <text x="545.0" y="214" text-anchor="middle" class="desc vcenter">color</text>
  <text x="545.0" y="230" text-anchor="middle" class="tiny vcenter">u8×4 (4B)</text>

  <!-- Vertex 1 -->
  <text x="110" y="292" class="label">Vertex 1</text>
  <text x="110" y="314" class="tiny">offset 12</text>

  <rect x="200" y="276" width="153.333" height="44" class="chip boxPos"/>
  <rect x="353.333" y="276" width="153.333" height="44" class="chip boxPos"/>
  <rect x="506.666" y="276" width="76.667" height="44" class="chip boxColor"/>

  <text x="276.666" y="294" text-anchor="middle" class="desc vcenter">pos.x</text>
  <text x="276.666" y="310" text-anchor="middle" class="tiny vcenter">f32 (4B)</text>

  <text x="430.0" y="294" text-anchor="middle" class="desc vcenter">pos.y</text>
  <text x="430.0" y="310" text-anchor="middle" class="tiny vcenter">f32 (4B)</text>

  <text x="545.0" y="294" text-anchor="middle" class="desc vcenter">color</text>
  <text x="545.0" y="310" text-anchor="middle" class="tiny vcenter">u8×4 (4B)</text>

  <!-- Vertex 2 -->
  <text x="110" y="372" class="label">Vertex 2</text>
  <text x="110" y="394" class="tiny">offset 24</text>

  <rect x="200" y="356" width="153.333" height="44" class="chip boxPos"/>
  <rect x="353.333" y="356" width="153.333" height="44" class="chip boxPos"/>
  <rect x="506.666" y="356" width="76.667" height="44" class="chip boxColor"/>

  <text x="276.666" y="374" text-anchor="middle" class="desc vcenter">pos.x</text>
  <text x="276.666" y="390" text-anchor="middle" class="tiny vcenter">f32 (4B)</text>

  <text x="430.0" y="374" text-anchor="middle" class="desc vcenter">pos.y</text>
  <text x="430.0" y="390" text-anchor="middle" class="tiny vcenter">f32 (4B)</text>

  <text x="545.0" y="374" text-anchor="middle" class="desc vcenter">color</text>
  <text x="545.0" y="390" text-anchor="middle" class="tiny vcenter">u8×4 (4B)</text>

  <!-- Legend -->
  <rect x="70" y="444" width="620" height="50" rx="16" class="box boxIO"/>

  <rect x="92" y="459" width="18" height="18" rx="5" class="boxPos" stroke="rgba(148,163,184,.75)" stroke-width="1.3"/>
  <text x="120" y="473" class="desc">position（float32x2）</text>

  <rect x="300" y="459" width="18" height="18" rx="5" class="boxColor" stroke="rgba(148,163,184,.75)" stroke-width="1.3"/>
  <text x="328" y="473" class="desc">color（unorm8x4 / RGBA）</text>

  <text x="690" y="473" text-anchor="end" class="tiny">total: 36 bytes</text>
</svg>
