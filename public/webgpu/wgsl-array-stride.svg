<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500"><defs><linearGradient id="vecFill" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="rgba(99, 102, 241, 0.22)"/><stop offset="100%" stop-color="rgba(99, 102, 241, 0.12)"/></linearGradient><linearGradient id="padFill" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="rgba(148, 163, 184, 0.24)"/><stop offset="100%" stop-color="rgba(148, 163, 184, 0.14)"/></linearGradient><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="6" flood-color="rgba(2, 6, 23, 0.18)" stdDeviation="8"/></filter><style>.label{font:700 14px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)}.small{font:500 12px/1.35 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(71,85,105,.92)}.tiny{font:500 11px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(71,85,105,.86)}.offset{font:700 11px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,&quot;Liberation Mono&quot;,&quot;Courier New&quot;,monospace;fill:rgba(100,116,139,.92)}</style></defs><text x="380" y="60" style="font:700 28px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)" text-anchor="middle">数组 stride：为什么 `array&lt;vec3f, 3&gt;` 是 48 字节</text><text x="380" y="90" style="font:400 14px/1.4 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(100,116,139,.92)" text-anchor="middle">`vec3f` 的 size 是 12，但 align 是 16，所以数组里的每个元素都要占 16 字节槽位</text><g filter="url(#shadow)"><rect width="648" height="296" x="56" y="126" rx="18" style="stroke:rgba(148,163,184,.75);stroke-width:1.5;fill:rgba(148,163,184,.1)"/></g><text x="80" y="160" class="label">array&lt;vec3f, 3&gt;</text><text x="80" y="188" class="small">stride = roundUp(12, 16) = 16</text><text x="96" y="248" class="offset">0</text><rect width="144" height="56" x="132" y="224" fill="url(#vecFill)" stroke="rgba(99,102,241,.78)" stroke-width="1.8" rx="14"/><text x="204" y="249" class="label" text-anchor="middle">element 0</text><text x="204" y="266" class="tiny" text-anchor="middle">vec3f data · 12 bytes</text><rect width="48" height="56" x="276" y="224" fill="url(#padFill)" stroke="rgba(148,163,184,.78)" stroke-width="1.8" rx="14"/><text x="300" y="249" class="label" text-anchor="middle">padding</text><text x="300" y="266" class="tiny" text-anchor="middle">4 bytes</text><text x="356" y="248" class="offset">16</text><rect width="144" height="56" x="392" y="224" fill="url(#vecFill)" stroke="rgba(99,102,241,.78)" stroke-width="1.8" rx="14"/><text x="464" y="249" class="label" text-anchor="middle">element 1</text><text x="464" y="266" class="tiny" text-anchor="middle">vec3f data · 12 bytes</text><rect width="48" height="56" x="536" y="224" fill="url(#padFill)" stroke="rgba(148,163,184,.78)" stroke-width="1.8" rx="14"/><text x="560" y="249" class="label" text-anchor="middle">padding</text><text x="560" y="266" class="tiny" text-anchor="middle">4 bytes</text><text x="96" y="340" class="offset">32</text><rect width="144" height="56" x="132" y="316" fill="url(#vecFill)" stroke="rgba(99,102,241,.78)" stroke-width="1.8" rx="14"/><text x="204" y="341" class="label" text-anchor="middle">element 2</text><text x="204" y="358" class="tiny" text-anchor="middle">vec3f data · 12 bytes</text><rect width="48" height="56" x="276" y="316" fill="url(#padFill)" stroke="rgba(148,163,184,.78)" stroke-width="1.8" rx="14"/><text x="300" y="341" class="label" text-anchor="middle">padding</text><text x="300" y="358" class="tiny" text-anchor="middle">4 bytes</text><text x="356" y="340" class="offset">48</text><text x="392" y="340" class="small">数组在这里结束：3 × 16 = 48 bytes</text><path stroke="rgba(99,102,241,.7)" stroke-width="2.2" marker-end="url(#arrow)" d="M324 252h36"/><path stroke="rgba(99,102,241,.7)" stroke-width="2.2" marker-end="url(#arrow)" d="M584 252h36"/><text x="80" y="404" class="small">结论：数组关心的是 stride，不只是单个元素的 size。</text><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="8.5" refY="5" viewBox="0 0 10 10"><path fill="rgba(99,102,241,.75)" d="m0 0 10 5-10 5Z"/></marker></svg>