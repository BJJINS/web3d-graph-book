<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1040"><defs><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="8.5" refY="5" viewBox="0 0 10 10"><path fill="rgba(99, 102, 241, 0.75)" d="m0 0 10 5-10 5z"/></marker><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="6" flood-color="rgba(2, 6, 23, 0.18)" stdDeviation="8"/></filter><style>.stepTitle{font:700 20px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)}.stepDesc{font:400 13px/1.35 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(71,85,105,.92)}.box{stroke:rgba(148,163,184,.75);stroke-width:1.5}.boxShader{fill:rgba(99,102,241,.12)}.boxStage{fill:rgba(148,163,184,.14)}.boxIO{fill:rgba(148,163,184,.1)}.arrow{stroke:rgba(99,102,241,.75);stroke-width:2.2;stroke-linecap:round}</style></defs><text x="380" y="72" style="font:700 28px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)" text-anchor="middle">顶点渲染管线流程</text><text x="380" y="102" style="font:400 14px/1.4 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(100,116,139,.92)" text-anchor="middle">从输入顶点数据到屏幕像素（WebGPU / GPU Render Pipeline）</text><g filter="url(#shadow)"><rect width="480" height="96" x="140" y="140" class="box boxIO" rx="16"/></g><text x="380" y="182" class="stepTitle" text-anchor="middle">输入数据（Input Data）</text><text x="380" y="208" class="stepDesc" text-anchor="middle">顶点缓冲、索引缓冲、常量/Uniform 等</text><path marker-end="url(#arrow)" d="M380 236v32" class="arrow"/><g filter="url(#shadow)"><rect width="480" height="96" x="140" y="268" class="box boxShader" rx="16"/></g><text x="380" y="310" class="stepTitle" text-anchor="middle">顶点着色器（Vertex Shader）</text><text x="380" y="336" class="stepDesc" text-anchor="middle">计算顶点位置，输出可插值的顶点属性</text><path marker-end="url(#arrow)" d="M380 364v32" class="arrow"/><g filter="url(#shadow)"><rect width="480" height="96" x="140" y="396" class="box boxStage" rx="16"/></g><text x="380" y="438" class="stepTitle" text-anchor="middle">图元装配（Primitive Assembly）</text><text x="380" y="464" class="stepDesc" text-anchor="middle">按拓扑组装点/线/三角形，准备进入光栅化</text><path marker-end="url(#arrow)" d="M380 492v32" class="arrow"/><g filter="url(#shadow)"><rect width="480" height="96" x="140" y="524" class="box boxStage" rx="16"/></g><text x="380" y="566" class="stepTitle" text-anchor="middle">光栅化（Rasterization）</text><text x="380" y="592" class="stepDesc" text-anchor="middle">把图元覆盖到像素网格，生成片元并插值属性</text><path marker-end="url(#arrow)" d="M380 620v32" class="arrow"/><g filter="url(#shadow)"><rect width="480" height="96" x="140" y="652" class="box boxShader" rx="16"/></g><text x="380" y="694" class="stepTitle" text-anchor="middle">片元着色器（Fragment Shader）</text><text x="380" y="720" class="stepDesc" text-anchor="middle">为每个片元计算颜色等输出（可能丢弃片元）</text><path marker-end="url(#arrow)" d="M380 748v32" class="arrow"/><g filter="url(#shadow)"><rect width="480" height="96" x="140" y="780" class="box boxStage" rx="16"/></g><text x="380" y="822" class="stepTitle" text-anchor="middle">颜色与混合（Color &amp; Blending）</text><text x="380" y="848" class="stepDesc" text-anchor="middle">深度/模板测试，Alpha 混合，写入帧缓冲</text><path marker-end="url(#arrow)" d="M380 876v32" class="arrow"/><g filter="url(#shadow)"><rect width="480" height="96" x="140" y="908" class="box boxIO" rx="16"/></g><text x="380" y="950" class="stepTitle" text-anchor="middle">像素（Pixels）</text><text x="380" y="976" class="stepDesc" text-anchor="middle">最终显示在屏幕上的结果</text></svg>