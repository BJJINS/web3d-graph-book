<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760"><defs><radialGradient id="sphereGlow" cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="rgba(99, 102, 241, 0.28)"/><stop offset="60%" stop-color="rgba(99, 102, 241, 0.14)"/><stop offset="100%" stop-color="rgba(99, 102, 241, 0.08)"/></radialGradient><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="8.5" refY="5" viewBox="0 0 10 10"><path fill="rgba(99, 102, 241, 0.75)" d="m0 0 10 5-10 5z"/></marker><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="6" flood-color="rgba(2, 6, 23, 0.18)" stdDeviation="8"/></filter><style>.label{font:700 14px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)}.small{font:500 12px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(71,85,105,.92)}.box{stroke:rgba(148,163,184,.75);stroke-width:1.5;fill:rgba(148,163,184,.1)}.objFill{fill:rgba(99,102,241,.12);stroke:rgba(99,102,241,.78);stroke-width:2.2}.objLight{fill:rgba(99,102,241,.08);stroke:rgba(99,102,241,.55);stroke-width:1.8}.eyeStroke{stroke:rgba(15,23,42,.82);stroke-width:2.2;fill:rgba(255,255,255,.95)}.pupil{fill:rgba(99,102,241,.95)}.ray{stroke:rgba(99,102,241,.75);stroke-width:2.2;stroke-linecap:round}</style></defs><text x="380" y="62" style="font:700 28px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)" text-anchor="middle">从 3D 到 2D：投影与视线方向</text><text x="380" y="92" style="font:400 14px/1.4 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(100,116,139,.92)" text-anchor="middle">同一组 3D 物体，从不同观察方向投影到屏幕上会得到不同的二维结果</text><g filter="url(#shadow)"><rect width="648" height="274" x="56" y="126" class="box" rx="18"/></g><text x="80" y="160" class="label">视角 A</text><text x="80" y="182" class="small">斜向观察 → 立方体与球体的相对位置不同</text><g filter="url(#shadow)"><rect width="648" height="274" x="56" y="430" class="box" rx="18"/></g><text x="80" y="464" class="label">视角 B</text><text x="80" y="486" class="small">换一个方向观察 → 投影后的形状位置/遮挡关系变化</text><ellipse cx="118" cy="262" class="eyeStroke" rx="34" ry="20"/><circle cx="118" cy="262" r="7.5" class="pupil"/><path fill="none" stroke="rgba(15, 23, 42, 0.38)" stroke-width="1.6" d="M88 262c8-12 20-18 30-18s22 6 30 18"/><ellipse cx="330" cy="520" class="eyeStroke" rx="34" ry="20"/><circle cx="330" cy="528" r="7.5" class="pupil"/><path fill="none" stroke="rgba(15, 23, 42, 0.38)" stroke-width="1.6" d="M300 520c8-12 20-18 30-18s22 6 30 18"/><path d="M220 320h188l58-74H278zm20 352h188l58-74H298z" style="stroke-width:1.5;fill:rgba(148,163,184,.12);stroke:rgba(148,163,184,.55)"/><ellipse cx="374" cy="276" fill="url(#sphereGlow)" stroke="rgba(99, 102, 241, 0.78)" stroke-width="2.2" rx="26" ry="22"/><path d="M300 300h46l12-30h-46z" class="objLight"/><path d="M300 300v-38l12-28v36zm46 0v-38l12-28v36z" class="objFill"/><path d="M300 262h46l12-28h-46z" class="objFill"/><ellipse cx="394" cy="628" fill="url(#sphereGlow)" stroke="rgba(99, 102, 241, 0.78)" stroke-width="2.2" rx="26" ry="22"/><path d="M320 652h46l12-30h-46z" class="objLight"/><path d="M320 652v-38l12-28v36zm46 0v-38l12-28v36z" class="objFill"/><path d="M320 614h46l12-28h-46z" class="objFill"/><path marker-end="url(#arrow)" d="M152 262h62" class="ray"/><path marker-end="url(#arrow)" d="M330 542v24" class="ray"/><path d="m214 262 64-16m-64 16 26 58m90 246-32 32m32-32 156 32" style="stroke-linecap:round;stroke:rgba(99,102,241,.55);stroke-width:1.6;stroke-dasharray:6 6"/><g filter="url(#shadow)"><rect width="164" height="164" x="520" y="196" class="box" rx="16"/></g><text x="602" y="186" class="small" text-anchor="middle">二维视平面（屏幕）</text><rect width="62" height="62" x="546" y="222" class="objFill" rx="8"/><text x="602" y="346" class="small" text-anchor="middle">视角 A 的投影</text><g filter="url(#shadow)"><rect width="164" height="164" x="520" y="500" class="box" rx="16"/></g><text x="602" y="490" class="small" text-anchor="middle">二维视平面（屏幕）</text><rect width="56" height="56" x="578" y="544" class="objFill" rx="8"/><circle cx="640" cy="574" r="24" fill="url(#sphereGlow)" stroke="rgba(99, 102, 241, 0.78)" stroke-width="2.2"/><text x="602" y="650" class="small" text-anchor="middle">视角 B 的投影</text></svg>