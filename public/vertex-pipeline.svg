<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1040" viewBox="0 0 760 1040">
  <defs>
    <style>
      .title { font: 700 28px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: rgba(15, 23, 42, 0.92); }
      .subtitle { font: 400 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: rgba(100, 116, 139, 0.92); }
      .stepTitle { font: 700 20px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: rgba(15, 23, 42, 0.92); }
      .stepDesc { font: 400 13px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: rgba(71, 85, 105, 0.92); }
      .box { stroke: rgba(148, 163, 184, 0.75); stroke-width: 1.5; }
      .boxShader { fill: rgba(99, 102, 241, 0.12); }
      .boxStage { fill: rgba(148, 163, 184, 0.14); }
      .boxIO { fill: rgba(148, 163, 184, 0.10); }
      .arrow { stroke: rgba(99, 102, 241, 0.75); stroke-width: 2.2; stroke-linecap: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(99, 102, 241, 0.75)" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(2, 6, 23, 0.18)" />
    </filter>
  </defs>

  <text x="380" y="72" text-anchor="middle" class="title">顶点渲染管线流程</text>
  <text x="380" y="102" text-anchor="middle" class="subtitle">从输入顶点数据到屏幕像素（WebGPU / GPU Render Pipeline）</text>

  <!-- Layout constants:
       box: x=140, w=480, h=96, rx=16
       centers on x=380, vertical spacing=44
  -->

  <!-- Input -->
  <g filter="url(#shadow)">
    <rect x="140" y="140" width="480" height="96" rx="16" class="box boxIO" />
  </g>
  <text x="380" y="182" text-anchor="middle" class="stepTitle">输入数据（Input Data）</text>
  <text x="380" y="208" text-anchor="middle" class="stepDesc">顶点缓冲、索引缓冲、常量/Uniform 等</text>

  <line x1="380" y1="236" x2="380" y2="268" class="arrow" marker-end="url(#arrow)" />

  <!-- Vertex shader -->
  <g filter="url(#shadow)">
    <rect x="140" y="268" width="480" height="96" rx="16" class="box boxShader" />
  </g>
  <text x="380" y="310" text-anchor="middle" class="stepTitle">顶点着色器（Vertex Shader）</text>
  <text x="380" y="336" text-anchor="middle" class="stepDesc">计算顶点位置，输出可插值的顶点属性</text>

  <line x1="380" y1="364" x2="380" y2="396" class="arrow" marker-end="url(#arrow)" />

  <!-- Assembly -->
  <g filter="url(#shadow)">
    <rect x="140" y="396" width="480" height="96" rx="16" class="box boxStage" />
  </g>
  <text x="380" y="438" text-anchor="middle" class="stepTitle">图元装配（Primitive Assembly）</text>
  <text x="380" y="464" text-anchor="middle" class="stepDesc">按拓扑组装点/线/三角形，准备进入光栅化</text>

  <line x1="380" y1="492" x2="380" y2="524" class="arrow" marker-end="url(#arrow)" />

  <!-- Rasterization -->
  <g filter="url(#shadow)">
    <rect x="140" y="524" width="480" height="96" rx="16" class="box boxStage" />
  </g>
  <text x="380" y="566" text-anchor="middle" class="stepTitle">光栅化（Rasterization）</text>
  <text x="380" y="592" text-anchor="middle" class="stepDesc">把图元覆盖到像素网格，生成片元并插值属性</text>

  <line x1="380" y1="620" x2="380" y2="652" class="arrow" marker-end="url(#arrow)" />

  <!-- Fragment shader -->
  <g filter="url(#shadow)">
    <rect x="140" y="652" width="480" height="96" rx="16" class="box boxShader" />
  </g>
  <text x="380" y="694" text-anchor="middle" class="stepTitle">片元着色器（Fragment Shader）</text>
  <text x="380" y="720" text-anchor="middle" class="stepDesc">为每个片元计算颜色等输出（可能丢弃片元）</text>

  <line x1="380" y1="748" x2="380" y2="780" class="arrow" marker-end="url(#arrow)" />

  <!-- Color blending -->
  <g filter="url(#shadow)">
    <rect x="140" y="780" width="480" height="96" rx="16" class="box boxStage" />
  </g>
  <text x="380" y="822" text-anchor="middle" class="stepTitle">颜色与混合（Color &amp; Blending）</text>
  <text x="380" y="848" text-anchor="middle" class="stepDesc">深度/模板测试，Alpha 混合，写入帧缓冲</text>

  <line x1="380" y1="876" x2="380" y2="908" class="arrow" marker-end="url(#arrow)" />

  <!-- Pixels -->
  <g filter="url(#shadow)">
    <rect x="140" y="908" width="480" height="96" rx="16" class="box boxIO" />
  </g>
  <text x="380" y="950" text-anchor="middle" class="stepTitle">像素（Pixels）</text>
  <text x="380" y="976" text-anchor="middle" class="stepDesc">最终显示在屏幕上的结果</text>
</svg>
