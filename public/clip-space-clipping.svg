<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520">
  <defs>
    <style>
      .title { font: 700 28px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: rgba(15, 23, 42, 0.92); }
      .subtitle { font: 400 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: rgba(100, 116, 139, 0.92); }
      .label { font: 600 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: rgba(15, 23, 42, 0.92); }
      .small { font: 500 12px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; fill: rgba(71, 85, 105, 0.92); }
      .box { stroke: rgba(148, 163, 184, 0.75); stroke-width: 1.5; fill: rgba(148, 163, 184, 0.10); }
      .axis { stroke: rgba(148, 163, 184, 0.55); stroke-width: 1.5; }
      .axisDash { stroke: rgba(148, 163, 184, 0.45); stroke-width: 1.2; stroke-dasharray: 6 6; }
      .triFull { fill: rgba(99, 102, 241, 0.06); stroke: rgba(99, 102, 241, 0.55); stroke-width: 2.2; stroke-dasharray: 7 7; }
      .triClipped { fill: rgba(99, 102, 241, 0.12); stroke: rgba(99, 102, 241, 0.78); stroke-width: 2.4; }
      .pt { fill: rgba(99, 102, 241, 0.95); stroke: rgba(255, 255, 255, 1); stroke-width: 2; }
      .ptOut { fill: rgba(99, 102, 241, 0.35); stroke: rgba(255, 255, 255, 1); stroke-width: 2; }
      .callout { stroke: rgba(99, 102, 241, 0.75); stroke-width: 1.8; stroke-linecap: round; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(2, 6, 23, 0.18)" />
    </filter>
  </defs>

  <text x="380" y="64" text-anchor="middle" class="title">剪裁空间中的图元剪裁</text>
  <text x="380" y="94" text-anchor="middle" class="subtitle">三角形部分落在剪裁空间之外时，会在边界处产生新的交点顶点</text>

  <g filter="url(#shadow)">
    <rect x="160" y="140" width="440" height="300" rx="16" class="box" />
  </g>

  <line x1="380" y1="160" x2="380" y2="420" class="axisDash" />
  <line x1="180" y1="290" x2="580" y2="290" class="axisDash" />

  <text x="380" y="132" text-anchor="middle" class="label">剪裁空间（Clip Space）</text>
  <text x="380" y="462" text-anchor="middle" class="small">矩形边界表示可见范围（示意）</text>

  <polygon points="280,360 430,230 640,270" class="triFull" />

  <polygon points="280,360 430,230 600,245.45 600,275.56" class="triClipped" />

  <circle cx="280" cy="360" r="7.5" class="pt" />
  <circle cx="430" cy="230" r="7.5" class="pt" />
  <circle cx="640" cy="270" r="7.5" class="ptOut" />
  <circle cx="600" cy="275.56" r="7.5" class="pt" />
  <circle cx="600" cy="245.45" r="7.5" class="pt" />

  <line x1="280" y1="360" x2="248" y2="392" class="callout" />
  <text x="242" y="408" text-anchor="end" class="label">V0</text>
  <text x="242" y="426" text-anchor="end" class="small">原始顶点（inside）</text>

  <line x1="430" y1="230" x2="430" y2="190" class="callout" />
  <text x="430" y="176" text-anchor="middle" class="label">V1</text>
  <text x="430" y="158" text-anchor="middle" class="small">原始顶点（inside）</text>

  <line x1="640" y1="270" x2="680" y2="270" class="callout" />
  <text x="688" y="274" text-anchor="start" class="label">V2</text>
  <text x="688" y="292" text-anchor="start" class="small">原始顶点（outside）</text>

  <line x1="600" y1="275.56" x2="640" y2="312" class="callout" />
  <text x="648" y="316" text-anchor="start" class="label">I0</text>
  <text x="648" y="334" text-anchor="start" class="small">交点顶点</text>

  <line x1="600" y1="245.45" x2="640" y2="210" class="callout" />
  <text x="648" y="214" text-anchor="start" class="label">I1</text>
  <text x="648" y="232" text-anchor="start" class="small">交点顶点</text>
</svg>

