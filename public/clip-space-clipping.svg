<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520"><defs><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="6" flood-color="rgba(2, 6, 23, 0.18)" stdDeviation="8"/></filter><style>.label{font:600 14px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)}.small{font:500 12px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(71,85,105,.92)}.pt{fill:rgba(99,102,241,.95);stroke:#fff;stroke-width:2}.callout{stroke:rgba(99,102,241,.75);stroke-width:1.8;stroke-linecap:round}</style></defs><text x="380" y="64" style="font:700 28px/1.2 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(15,23,42,.92)" text-anchor="middle">剪裁空间中的图元剪裁</text><text x="380" y="94" style="font:400 14px/1.4 -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,&quot;Helvetica Neue&quot;,Arial,&quot;Noto Sans&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:rgba(100,116,139,.92)" text-anchor="middle">三角形部分落在剪裁空间之外时，会在边界处产生新的交点顶点</text><g filter="url(#shadow)"><rect width="440" height="300" x="160" y="140" rx="16" style="stroke:rgba(148,163,184,.75);stroke-width:1.5;fill:rgba(148,163,184,.1)"/></g><path d="M380 160v260M180 290h400" style="stroke:rgba(148,163,184,.45);stroke-width:1.2;stroke-dasharray:6 6"/><text x="380" y="132" class="label" text-anchor="middle">剪裁空间（Clip Space）</text><text x="380" y="462" class="small" text-anchor="middle">矩形边界表示可见范围（示意）</text><path d="m280 360 150-130 210 40z" style="fill:rgba(99,102,241,.06);stroke:rgba(99,102,241,.55);stroke-width:2.2;stroke-dasharray:7 7"/><path d="m280 360 150-130 170 15.45v30.11z" style="fill:rgba(99,102,241,.12);stroke:rgba(99,102,241,.78);stroke-width:2.4"/><circle cx="280" cy="360" r="7.5" class="pt"/><circle cx="430" cy="230" r="7.5" class="pt"/><circle cx="640" cy="270" r="7.5" style="fill:rgba(99,102,241,.35);stroke:#fff;stroke-width:2"/><circle cx="600" cy="275.56" r="7.5" class="pt"/><circle cx="600" cy="245.45" r="7.5" class="pt"/><path d="m280 360-32 32" class="callout"/><text x="242" y="408" class="label" text-anchor="end">V0</text><text x="242" y="426" class="small" text-anchor="end">原始顶点（inside）</text><path d="M430 230v-40" class="callout"/><text x="430" y="176" class="label" text-anchor="middle">V1</text><text x="430" y="158" class="small" text-anchor="middle">原始顶点（inside）</text><path d="M640 270h40" class="callout"/><text x="688" y="274" class="label">V2</text><text x="688" y="292" class="small">原始顶点（outside）</text><path d="M600 275.56 640 312" class="callout"/><text x="648" y="316" class="label">I0</text><text x="648" y="334" class="small">交点顶点</text><path d="M600 245.45 640 210" class="callout"/><text x="648" y="214" class="label">I1</text><text x="648" y="232" class="small">交点顶点</text></svg>